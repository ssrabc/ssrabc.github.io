    <main>
        <div class="container">
            <h1 class="page-title">联系我</h1>
            <div class="contact-wrapper">
                <!-- 左侧联系方式 -->
                <div class="contact-info">
                    <h3>📫 保持联络</h3>
                    <div class="info-item">📧 2855568084@qq.com</div>
                    <div class="info-item">🐙 GitHub /</div>
                    <div class="info-item">💬 Twitter /</div>
					<div class="info-item">🐧 QQ / 2855568084</div>
					<div class="info-item">💬 微信 / yiheMMM</div>
                    <div class="social-links">
                        <a href="#">GitHub</a>
                        <a href="#">小红书</a>
                        <a href="#">tiktok</a>
						<a href="#">抖音</a>
                    </div>
                    <p style="margin-top: 1.8rem; font-size: 0.9rem;">✨ 工作合作或技术交流，欢迎留言～</p>
                </div>

                <!-- 右侧留言表单 -->
                <div class="contact-form">
                    <h3>✍️ 给我留言</h3>
                    <form id="contact-form">
                        <div class="form-group">
                            <label for="name">姓名</label>
                            <input type="text" id="name" name="name" placeholder="你的名字" required>
                        </div>
                        <div class="form-group">
                            <label for="email">邮箱</label>
                            <input type="email" id="email" name="email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="message">消息</label>
                            <textarea id="message" name="message" rows="4" placeholder="想聊点什么？"></textarea>
                        </div>
                        <button type="submit" class="btn-submit">发送消息</button>
                        <div id="form-message"></div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
